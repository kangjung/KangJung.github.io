---
# Home layout: shares the hub chrome via hub-base and adds the home-only
# scripts that render games/apps from appList.json and (optionally) an
# external blog RSS feed.
layout: hub-base
---
{{ content }}

{%- include multi_lng/get-lng-by-url.liquid -%}{%- assign lng = get_lng -%}
<script>
(function () {
  var LANG = '{{ lng }}';
  var T = LANG === 'en'
    ? { soon: 'In development', comingSoon: 'Coming soon', features: 'Features', shots: 'Screenshots', get: 'Get it', close: 'Close' }
    : { soon: '개발 중', comingSoon: 'Coming soon', features: '주요 특징', shots: '스크린샷', get: '받을 수 있는 곳', close: '닫기' };
  var EMOJI = { 'game': '🎮', 'app': '📱' };
  function esc(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]; }); }
  function pick(o) { return o ? (o[LANG] || o.ko || o.en || '') : ''; }
  function iconUrl(p) {
    if (!p) return null;
    if (p.indexOf('http') === 0 || p.charAt(0) === '/') return p;            // absolute
    if (p.indexOf('./') === 0) return '{{ site.baseurl }}/game' + p.slice(1); // ./img/.. -> /game/img/..
    return p;
  }

  // Screenshots auto-discovered at build time from game/img/shots/<slug>/*.
  // Drop images into that folder (named so they sort, e.g. 01.png) and they
  // show up in the matching item's modal — no JSON edit needed. A manual
  // "screenshots" array on an item overrides this.
  var SHOTS_FLAT = [
  {%- assign shot_files = site.static_files | where_exp: "f", "f.path contains '/game/img/shots/'" | sort: "path" -%}
  {%- for f in shot_files -%}{% unless forloop.first %},{% endunless %}"{{ f.path | relative_url }}"{%- endfor -%}
  ];
  var SHOTS = {};
  SHOTS_FLAT.forEach(function (p) {
    var m = p.match(/\/game\/img\/shots\/([^\/]+)\/[^\/]+\.(?:png|jpe?g|webp|gif|avif)$/i); // images only (skips .gitkeep, README)
    if (m) { (SHOTS[m[1]] = SHOTS[m[1]] || []).push(p); }
  });
  function resolvedShots(item) {
    if (item.screenshots && item.screenshots.length) return item.screenshots.map(iconUrl);
    return (SHOTS[item.slug] || []).slice();   // already site-absolute urls
  }

  // ---- render cards -----------------------------------------------------------
  function cardHTML(item) {
    var t = pick(item.title), d = pick(item.desc);
    var tag = (item.tags && item.tags[0]) ? item.tags[0].toUpperCase() : '';
    var soon = item.status === 'developing';
    var icon = iconUrl(item.icon);
    var art = icon
      ? '<div class="card-art"><img src="' + icon + '" alt="' + esc(t) + '" loading="lazy"></div>'
      : '<div class="card-art emoji">' + (EMOJI[item.type] || '🎲') + '</div>';
    var stores = soon
      ? '<span class="store-chip">' + T.comingSoon + '</span>'
      : (item.stores || []).map(function (s) { return '<span class="store-chip">' + esc(s.name) + '</span>'; }).join('');
    var body = '<div class="card-body"><div class="card-title"><h3>' + esc(t) + '</h3>' +
      (soon ? '<span class="badge-soon">' + T.soon + '</span>' : '') + '</div>' +
      '<p>' + esc(d) + '</p><div class="meta-row">' +
      (tag ? '<span class="tag">' + esc(tag) + '</span>' : '<span></span>') +
      '<span class="stores">' + stores + '</span></div></div>';
    return '<a class="card' + (soon ? ' soon' : '') + '" href="#' + esc(item.slug) + '">' + art + body + '</a>';
  }

  // ---- detail modal -----------------------------------------------------------
  var BY_SLUG = {};
  var modalRoot, mediaEl, bodyEl, triggerEl = null;
  var lb, lbImg, lbList = [], lbIdx = 0;
  function isOpen() { return modalRoot && modalRoot.classList.contains('open'); }
  function lbOpenNow() { return lb && lb.classList.contains('open'); }
  function focusables() {
    return Array.prototype.slice.call(
      modalRoot.querySelectorAll('a[href],button:not([disabled]),iframe,[tabindex]:not([tabindex="-1"])'));
  }
  function setBackgroundInert(on) {
    Array.prototype.forEach.call(document.body.children, function (el) {
      if (el === modalRoot || el === lb) return;
      if (on) { el.setAttribute('inert', ''); el.setAttribute('aria-hidden', 'true'); }
      else { el.removeAttribute('inert'); el.removeAttribute('aria-hidden'); }
    });
  }
  function onKeydown(e) {
    if (lbOpenNow()) {                              // lightbox takes priority over the modal
      if (e.key === 'Escape') { e.stopPropagation(); lbClose(); }
      else if (e.key === 'ArrowLeft') lbShow(lbIdx - 1);
      else if (e.key === 'ArrowRight') lbShow(lbIdx + 1);
      else if (e.key === 'Tab') e.preventDefault();
      return;
    }
    if (!isOpen()) return;
    if (e.key === 'Escape') { goClose(); return; }
    if (e.key === 'Tab') {                          // keep focus inside the dialog
      var f = focusables();
      if (!f.length) return;
      var first = f[0], last = f[f.length - 1];
      if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
      else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
    }
  }

  // ---- screenshot lightbox ----
  function ensureLightbox() {
    if (lb) return;
    lb = document.createElement('div');
    lb.className = 'lightbox';
    lb.setAttribute('role', 'dialog');
    lb.setAttribute('aria-modal', 'true');
    lb.setAttribute('aria-label', T.shots);
    lb.innerHTML =
      '<button class="lb-close" data-lb-close aria-label="' + T.close + '">✕</button>' +
      '<button class="lb-nav lb-prev" aria-label="prev">‹</button>' +
      '<img class="lb-img" alt="">' +
      '<button class="lb-nav lb-next" aria-label="next">›</button>';
    document.body.appendChild(lb);
    lbImg = lb.querySelector('.lb-img');
    lb.querySelector('.lb-prev').addEventListener('click', function (e) { e.stopPropagation(); lbShow(lbIdx - 1); });
    lb.querySelector('.lb-next').addEventListener('click', function (e) { e.stopPropagation(); lbShow(lbIdx + 1); });
    lb.addEventListener('click', function (e) { if (e.target === lb || e.target.hasAttribute('data-lb-close')) lbClose(); });
  }
  function lbOpen(list, i) {
    ensureLightbox();
    lbList = list || [];
    if (!lbList.length) return;
    lb.classList.add('open');
    lbShow(i);
    var c = lb.querySelector('.lb-close'); if (c) c.focus();
  }
  function lbShow(i) {
    if (!lbList.length) return;
    lbIdx = (i + lbList.length) % lbList.length;     // wrap around
    lbImg.src = lbList[lbIdx];
    var multi = lbList.length > 1;
    lb.querySelector('.lb-prev').style.display = multi ? '' : 'none';
    lb.querySelector('.lb-next').style.display = multi ? '' : 'none';
  }
  function lbClose() {
    if (!lb) return;
    lb.classList.remove('open');
    lbImg.src = '';
    var cb = modalRoot && modalRoot.querySelector('.modal-close'); if (cb) cb.focus();
  }
  function ensureModal() {
    if (modalRoot) return;
    modalRoot = document.createElement('div');
    modalRoot.className = 'modal-root';
    modalRoot.setAttribute('role', 'dialog');
    modalRoot.setAttribute('aria-modal', 'true');
    modalRoot.setAttribute('aria-labelledby', 'modal-title');
    modalRoot.innerHTML =
      '<div class="modal-backdrop" data-close></div>' +
      '<div class="modal-scroll" data-close><div class="modal">' +
        '<button class="modal-close" data-close aria-label="' + T.close + '">✕</button>' +
        '<div class="modal-media"></div>' +
        '<div class="modal-body"></div>' +
      '</div></div>';
    document.body.appendChild(modalRoot);
    mediaEl = modalRoot.querySelector('.modal-media');
    bodyEl = modalRoot.querySelector('.modal-body');
    modalRoot.addEventListener('click', function (e) {
      var shot = e.target.closest ? e.target.closest('.shot') : null;
      if (shot) {                                   // open the clicked screenshot in the lightbox
        var imgs = Array.prototype.slice.call(modalRoot.querySelectorAll('.shots .shot img'));
        lbOpen(imgs.map(function (im) { return im.src; }), parseInt(shot.getAttribute('data-idx'), 10) || 0);
        return;
      }
      if (e.target.hasAttribute('data-close')) goClose();
    });
    document.addEventListener('keydown', onKeydown);
  }

  function mediaHTML(item) {
    var t = esc(pick(item.title));
    if (item.video) {
      var src = item.video.replace('controls=0', 'controls=1').replace('autoplay=1', 'autoplay=0');
      return '<iframe src="' + src + '" title="' + t + '" allow="autoplay; encrypted-media" allowfullscreen></iframe>';
    }
    var hero = iconUrl(item.img) || resolvedShots(item)[0] || iconUrl(item.icon);
    if (hero) return '<img src="' + hero + '" alt="' + t + '">';
    return '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:64px">' + (EMOJI[item.type] || '🎲') + '</div>';
  }

  function buildBody(item) {
    var t = esc(pick(item.title));
    var desc = esc(pick(item.longDesc) || pick(item.desc));
    var icon = iconUrl(item.icon);
    var soon = item.status === 'developing';
    var html = '<div class="modal-head">' +
      (icon ? '<img src="' + icon + '" alt="' + t + '">' : '') +
      '<h2 id="modal-title">' + t + '</h2></div>';
    if (item.tags && item.tags.length) {
      html += '<div class="modal-tags">' + item.tags.map(function (x) { return '<span class="tag">' + esc(x) + '</span>'; }).join('') + '</div>';
    }

    // download / stores — placed up top as the primary call to action
    if (soon) {
      html += '<div class="modal-sec"><span class="modal-soon">' + T.soon + '</span></div>';
    } else if (item.stores && item.stores.length) {
      html += '<div class="modal-sec"><h4>' + T.get + '</h4><div class="store-badges">' +
        item.stores.map(function (s) {
          var ic = iconUrl(s.icon);
          return '<a class="store-badge" href="' + esc(s.url) + '" target="_blank" rel="noopener">' +
            (ic ? '<img src="' + ic + '" alt="">' : '') + esc(s.name) + '</a>';
        }).join('') + '</div></div>';
    }

    // screenshots — right below download; click a shot to enlarge (lightbox)
    var shots = resolvedShots(item);
    var heroImg = item.video ? null : (iconUrl(item.img) || shots[0]);
    var gallery = shots.filter(function (s) { return s !== heroImg; });
    if (gallery.length) {
      html += '<div class="modal-sec"><h4>' + T.shots + '</h4><div class="shots">' +
        gallery.map(function (u, i) { return '<button type="button" class="shot" data-idx="' + i + '"><img src="' + u + '" alt="' + t + '" loading="lazy"></button>'; }).join('') +
        '</div></div>';
    }

    if (desc) html += '<p class="modal-desc">' + desc + '</p>';

    var feats = item.features ? (item.features[LANG] || item.features.ko || item.features.en) : null;
    if (feats && feats.length) {
      html += '<div class="modal-sec"><h4>' + T.features + '</h4><ul class="modal-feats">' +
        feats.map(function (f) { return '<li>' + esc(f) + '</li>'; }).join('') + '</ul></div>';
    }
    return html;
  }

  function openModal(item) {
    ensureModal();
    mediaEl.innerHTML = mediaHTML(item);
    bodyEl.innerHTML = buildBody(item);
    bodyEl.scrollTop = 0;                    // start the scrollable body at the top
    modalRoot.classList.add('open');
    document.documentElement.style.overflow = 'hidden';
    setBackgroundInert(true);
    var closeBtn = modalRoot.querySelector('.modal-close');
    if (closeBtn) closeBtn.focus();         // move focus into the dialog
  }
  function closeUI() {
    if (!isOpen()) return;
    modalRoot.classList.remove('open');
    mediaEl.innerHTML = '';                 // stop any playing video
    document.documentElement.style.overflow = '';
    setBackgroundInert(false);
    if (triggerEl && typeof triggerEl.focus === 'function') triggerEl.focus(); // return focus to the card
    triggerEl = null;
  }
  function goClose() {
    // strip the slug from the URL without adding history; back button still closes
    if (history.replaceState) history.replaceState(null, '', location.pathname + location.search);
    closeUI();
  }
  function route() {
    var slug = (location.hash || '').replace(/^#/, '');
    var item = BY_SLUG[slug];
    if (item) {
      if (!isOpen()) triggerEl = document.activeElement;  // remember the card to restore focus to
      openModal(item);
    } else {
      closeUI();
    }
  }

  function setNum(id, n) { var el = document.getElementById(id); if (el) el.textContent = n; }

  fetch('{{ site.baseurl }}/assets/appList.json').then(function (r) { return r.json(); }).then(function (data) {
    var games = data.filter(function (x) { return x.type === 'game'; });
    var apps = data.filter(function (x) { return x.type === 'app'; });
    data.forEach(function (x) { if (x.slug) BY_SLUG[x.slug] = x; });
    var g = document.getElementById('games-grid'); if (g) g.innerHTML = games.map(cardHTML).join('');
    var a = document.getElementById('apps-grid'); if (a) a.innerHTML = apps.map(cardHTML).join('');
    // keep the hero stats in sync with the data (tools are static cards in the DOM)
    setNum('stat-games', games.length);
    setNum('stat-apps', apps.length);
    setNum('stat-tools', document.querySelectorAll('#tools .card').length);
    window.addEventListener('hashchange', route);
    route(); // open straight away if the page was loaded with #slug
  }).catch(function (e) { console.warn('appList load failed', e); });

  // ---- external blog RSS (optional) ----
  // External personal blog (Naver) — food, reviews, and the occasional dev post.
  var FEED_URL = 'https://rss.blog.naver.com/chicken_kangjung.xml';
  var box = document.getElementById('rss-items');
  if (FEED_URL && box) {
    fetch('https://api.rss2json.com/v1/api.json?rss_url=' + encodeURIComponent(FEED_URL))
      .then(function (r) { return r.json(); })
      .then(function (j) {
        if (!j.items || !j.items.length) return;
        box.innerHTML = j.items.slice(0, 3).map(function (it) {
          var date = new Date(it.pubDate);
          var ds = isNaN(date) ? '' : (date.getFullYear() + '.' + ('0' + (date.getMonth() + 1)).slice(-2) + '.' + ('0' + date.getDate()).slice(-2));
          return '<a class="rss-item" href="' + it.link + '" target="_blank" rel="noopener"><h4>' + it.title + '</h4><p>' + ds + '</p></a>';
        }).join('');
      })
      .catch(function (e) { console.warn('rss load failed', e); });
  }
})();
</script>
